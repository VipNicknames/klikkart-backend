<!DOCTYPE html>
<html>

<head>

  <title>Klikkart</title>

  <style>

    body{
      background:#111;
      color:white;
      font-family:sans-serif;
      margin:0;
      padding:20px;
    }

    h1{
      text-align:center;
      margin-bottom:30px;
    }

    #products{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
    }

    .card{
      background:#222;
      border-radius:15px;
      padding:15px;
      transition:0.3s;
    }

    .card:hover{
      transform:scale(1.03);
    }

    img{
      width:100%;
      height:220px;
      object-fit:contain;
      background:white;
      border-radius:10px;
    }

    h3{
      font-size:18px;
      margin-top:10px;
    }

    .price{
      color:lime;
      font-size:20px;
      font-weight:bold;
    }

    .desc{
      color:#bbb;
      font-size:14px;
    }

  </style>

</head>

<body>

  <h1>🎮 Klikkart Gaming Store</h1>

  <div id="products"></div>

  <script>

    fetch("/products")

    .then(res => res.json())

    .then(data => {

      const container = document.getElementById("products");

      data.forEach(product => {

        container.innerHTML += `

        <div class="card">

          <img src="${product.image}">

          <h3>${product.title}</h3>

          <p class="price">₹ ${Math.floor(product.price * 80)}</p>

          <p class="desc">${product.description}</p>

        </div>

        `;

      });

    });

  </script>

</body>

</html>
