<!DOCTYPE html>
<html>
<head>
  <title>Klikkart</title>
  <style>
    body{
      background:#111;
      color:white;
      font-family:sans-serif;
    }

    .products{
      display:flex;
      gap:20px;
      flex-wrap:wrap;
      padding:20px;
    }

    .card{
      background:#222;
      padding:15px;
      border-radius:10px;
      width:200px;
    }

    img{
      width:100%;
      border-radius:10px;
    }
  </style>
</head>
<body>

<h1>🎮 Klikkart Gaming Store</h1>

<div class="products" id="products"></div>

<script>
fetch("/products")
.then(res => res.json())
.then(data => {

  const container = document.getElementById("products");

  data.forEach(product => {

    container.innerHTML += `
      <div class="card">
        <img src="${product.image}">
        <h3>${product.name}</h3>
        <p>${product.price}</p>
      </div>
    `;

  });

});
</script>

</body>
</html>
